<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#0a0a0a">
<meta name="description" content="Web Inspector Pro - Full web analysis platform combining DevTools, GTmetrix, Ahrefs and VirusTotal features">
<title>Web Inspector Pro</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="assets/icon-192.png">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div id="app">

<header id="navbar" class="navbar">
  <div class="navbar-brand">
    <span class="brand-icon">◈</span>
    <span class="brand-text">Web Inspector Pro</span>
  </div>
  <div class="navbar-actions">
    <button id="historyBtn" class="icon-btn" title="History" aria-label="History">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M13 3a9 9 0 0 0-9 9H1l4 4 4-4H6a7 7 0 1 1 7 7v2a9 9 0 1 0 0-18z"/></svg>
    </button>
    <button id="favoritesBtn" class="icon-btn" title="Favorites" aria-label="Favorites">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 21s-6.7-4.35-9.3-8.05C.7 10.1 1.4 6.7 4.4 5.1c2.2-1.15 4.6-.4 6 1.3l1.6 2 1.6-2c1.4-1.7 3.8-2.45 6-1.3 3 1.6 3.7 5 1.7 7.85C18.7 16.65 12 21 12 21z"/></svg>
    </button>
    <button id="settingsBtn" class="icon-btn" title="Settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19.14 12.94a7.14 7.14 0 0 0 .06-.94 7.14 7.14 0 0 0-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.3 7.3 0 0 0-1.63-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54c-.59.24-1.14.56-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L1.63 8.84a.5.5 0 0 0 .12.64l2.03 1.58a7.14 7.14 0 0 0 0 1.88L1.75 14.5a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96c.49.38 1.04.7 1.63.94l.36 2.54a.5.5 0 0 0 .5.42h3.84a.5.5 0 0 0 .5-.42l.36-2.54c.59-.24 1.14-.56 1.63-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64zM12 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7z"/></svg>
    </button>
    <button id="authBtn" class="icon-btn" title="Account" aria-label="Account">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2c-4.42 0-8 2.24-8 5v2h16v-2c0-2.76-3.58-5-8-5z"/></svg>
    </button>
  </div>
</header>

<main class="main-content">

  <section id="scanSection" class="scan-section">
    <div class="scan-hero">
      <h1 class="scan-title">Analyze Any Website</h1>
      <p class="scan-subtitle">Security · Performance · SEO · Design · Network</p>
    </div>

    <form id="scanForm" class="scan-form">
      <div class="url-input-wrap">
        <span class="url-icon">🔗</span>
        <input type="text" id="urlInput" class="url-input" placeholder="example.com" autocomplete="off" autocapitalize="none" spellcheck="false" required>
        <button type="button" id="clearUrlBtn" class="clear-btn" aria-label="Clear">✕</button>
      </div>
      <button type="submit" id="scanBtn" class="scan-btn">
        <span class="scan-btn-text">Scan Website</span>
        <span class="scan-btn-icon">→</span>
      </button>
    </form>

    <div id="scanOptions" class="scan-options">
      <label class="option-chip">
        <input type="checkbox" id="deepScanToggle" checked>
        <span>Deep Scan</span>
      </label>
      <label class="option-chip">
        <input type="checkbox" id="screenshotToggle" checked>
        <span>Screenshot</span>
      </label>
      <label class="option-chip">
        <input type="checkbox" id="aiToggle" checked>
        <span>AI Analysis</span>
      </label>
    </div>
  </section>

  <section id="loaderSection" class="loader-section hidden">
    <div class="loader-container">
      <div class="loader-spinner"></div>
      <p id="loaderStatus" class="loader-status">Initializing scan...</p>
      <div class="loader-progress-bar">
        <div id="loaderProgressFill" class="loader-progress-fill"></div>
      </div>
      <div id="loaderSteps" class="loader-steps"></div>
    </div>
  </section>

  <section id="resultsSection" class="results-section hidden">

    <div class="results-header">
      <div class="results-url-info">
        <img id="resultFavicon" class="result-favicon" src="" alt="">
        <div>
          <h2 id="resultUrl" class="result-url"></h2>
          <span id="resultTimestamp" class="result-timestamp"></span>
        </div>
      </div>
      <div class="results-actions">
        <button id="favoriteBtn" class="icon-btn" title="Add to Favorites" aria-label="Favorite">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 21s-6.7-4.35-9.3-8.05C.7 10.1 1.4 6.7 4.4 5.1c2.2-1.15 4.6-.4 6 1.3l1.6 2 1.6-2c1.4-1.7 3.8-2.45 6-1.3 3 1.6 3.7 5 1.7 7.85C18.7 16.65 12 21 12 21z"/></svg>
        </button>
        <button id="shareBtn" class="icon-btn" title="Share" aria-label="Share">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81a3 3 0 1 0-3-3c0 .24.04.47.09.7L8.04 9.81A3 3 0 1 0 6 15.19l7.13 4.16c-.05.21-.08.43-.08.65a2.92 2.92 0 1 0 4.95-2.92z"/></svg>
        </button>
        <button id="pdfBtn" class="icon-btn" title="Export PDF" aria-label="Export PDF">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm2 14H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
        </button>
        <button id="newScanBtn" class="icon-btn" title="New Scan" aria-label="New Scan">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 5v2a5 5 0 1 1-5 5H5a7 7 0 1 0 7-7z"/><path fill="currentColor" d="M12 1v6l4-3z"/></svg>
        </button>
      </div>
    </div>

    <div class="score-overview">
      <div class="score-card" data-score-type="security">
        <div class="score-circle"><span id="securityScore">0</span></div>
        <span class="score-label">Security</span>
      </div>
      <div class="score-card" data-score-type="performance">
        <div class="score-circle"><span id="performanceScore">0</span></div>
        <span class="score-label">Performance</span>
      </div>
      <div class="score-card" data-score-type="seo">
        <div class="score-circle"><span id="seoScore">0</span></div>
        <span class="score-label">SEO</span>
      </div>
      <div class="score-card" data-score-type="design">
        <div class="score-circle"><span id="designScore">0</span></div>
        <span class="score-label">Design</span>
      </div>
    </div>

    <nav id="tabsNav" class="tabs-nav">
      <button class="tab-btn active" data-tab="overview">Overview</button>
      <button class="tab-btn" data-tab="html">HTML/DOM</button>
      <button class="tab-btn" data-tab="network">Network</button>
      <button class="tab-btn" data-tab="security">Security</button>
      <button class="tab-btn" data-tab="performance">Performance</button>
      <button class="tab-btn" data-tab="design">Design</button>
      <button class="tab-btn" data-tab="seo">SEO</button>
      <button class="tab-btn" data-tab="storage">Storage</button>
      <button class="tab-btn" data-tab="ai">AI Insights</button>
    </nav>

    <div id="tabContent" class="tab-content">

      <div id="tab-overview" class="tab-pane active">
        <div id="overviewContent" class="content-grid"></div>
      </div>

      <div id="tab-html" class="tab-pane">
        <div id="htmlContent" class="content-grid"></div>
      </div>

      <div id="tab-network" class="tab-pane">
        <div id="networkContent" class="content-grid"></div>
      </div>

      <div id="tab-security" class="tab-pane">
        <div id="securityContent" class="content-grid"></div>
      </div>

      <div id="tab-performance" class="tab-pane">
        <div id="performanceContent" class="content-grid"></div>
      </div>

      <div id="tab-design" class="tab-pane">
        <div id="designContent" class="content-grid"></div>
      </div>

      <div id="tab-seo" class="tab-pane">
        <div id="seoContent" class="content-grid"></div>
      </div>

      <div id="tab-storage" class="tab-pane">
        <div id="storageContent" class="content-grid"></div>
      </div>

      <div id="tab-ai" class="tab-pane">
        <div id="aiContent" class="content-grid"></div>
      </div>

    </div>
  </section>

  <section id="historySection" class="history-section hidden">
    <div class="section-header">
      <h2>Scan History</h2>
      <button id="closeHistoryBtn" class="icon-btn" aria-label="Close">✕</button>
    </div>
    <div id="historyList" class="history-list"></div>
  </section>

  <section id="favoritesSection" class="favorites-section hidden">
    <div class="section-header">
      <h2>Favorites</h2>
      <button id="closeFavoritesBtn" class="icon-btn" aria-label="Close">✕</button>
    </div>
    <div id="favoritesList" class="favorites-list"></div>
  </section>

  <section id="settingsSection" class="settings-section hidden">
    <div class="section-header">
      <h2>Settings</h2>
      <button id="closeSettingsBtn" class="icon-btn" aria-label="Close">✕</button>
    </div>
    <div id="settingsContent" class="settings-content"></div>
  </section>

  <section id="authSection" class="auth-section hidden">
    <div class="section-header">
      <h2 id="authTitle">Sign In</h2>
      <button id="closeAuthBtn" class="icon-btn" aria-label="Close">✕</button>
    </div>
    <div id="authContent" class="auth-content"></div>
  </section>

</main>

<div id="toastContainer" class="toast-container"></div>

<div id="modalOverlay" class="modal-overlay hidden">
  <div id="modalContent" class="modal-content"></div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>

<script src="firebase-config.js"></script>
<script src="components/loader.js"></script>
<script src="components/cards.js"></script>
<script src="components/tabs.js"></script>
<script src="components/navbar.js"></script>
<script src="auth.js"></script>
<script src="settings.js"></script>
<script src="script.js"></script>

</body>
</html>
